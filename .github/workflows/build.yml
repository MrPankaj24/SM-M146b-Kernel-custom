name: 🏗️ Build Kernel (s5e8535 / M14 - Clang 22)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: 🏗️ Build Kernel (s5e8535 / M14)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      KERNEL_REPO_OWNER: MrPankaj24
      KERNEL_REPO_NAME: kernel_common_modifications
      
      # ABI & KMI Settings (Matched perfectly to your build.sh)
      ABI_DEFINITION: ""
      KMI_SYMBOL_LIST_STRICT_MODE: "0"
      SKIP_ABI_CHECKS: "1"
      KMI_ENFORCE: "0"

      # Device & Toolchain variables
      DEVICE: m14x
      ARCH: arm64
      SUBARCH: arm64
      CC: "ccache clang-22"
      HOSTCC: "ccache clang-22"
      LLVM: "1"
      LTO: thin
      LLVM_IAS: "1"
      TARGET_SOC: s5e8535
      SOC_NAME: s5e8535
      DTC_FLAGS: "-@"
      PLATFORM_VERSION: "15"
      ANDROID_MAJOR_VERSION: "t"
      DEPMOD: depmod

      # --- THE PATH FIX ---
      # Mapping /root/... to the GitHub Workspace dynamically
      KERNEL_ROOT: ${{ github.workspace }}/kernel_common
      OUTDIR: ${{ github.workspace }}/kernel_common/out
      MODULES_OUTDIR: ${{ github.workspace }}/kernel_common/modules_out
      FINAL_STAGING: ${{ github.workspace }}/staging
      # Assuming backups/modules is stored inside the kernel repo
      IN_DLKM: ${{ github.workspace }}/kernel_common/backups/modules

      # Cross/clang settings
      CROSS_COMPILE: aarch64-linux-gnu-
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Kernel Source & Initialize Submodules (KernelSU Fix)
        run: |
          # Clone the main kernel repository
          git clone --depth=1 https://github.com/${{ env.KERNEL_REPO_OWNER }}/${{ env.KERNEL_REPO_NAME }}.git kernel_common
          
          # Navigate inside and pull down submodule source code (fixes drivers/kernelsu/Kconfig missing error)
          cd kernel_common
          git submodule update --init --recursive
          
          ls -la | sed -n '1,20p' || true

      - name: Setup LLVM 22 and Install Dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          
          # Add LLVM apt repo for clang-22 on Ubuntu 24.04
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          
          sudo apt-get update -y
          # Installed python3-setuptools for modern Ubuntu compatibility
          sudo apt-get install -y --no-install-recommends \
            clang-22 llvm-22 lld-22 \
            build-essential make bc libncurses-dev bison flex \
            python3 python3-setuptools python-is-python3 git ccache rsync \
            libssl-dev libelf-dev dwarves device-tree-compiler \
            file gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu sudo \
            lz4 zstd cpio
            
          mkdir -p "${CCACHE_DIR}"
          ccache -M "${CCACHE_MAXSIZE}" || true
          
          sudo ln -sf /usr/bin/clang-22 /usr/bin/clang || true
          sudo ln -sf /usr/bin/clang++-22 /usr/bin/clang++ || true

      - name: Cache Compiler Output (ccache)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('.github/workflows/build.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Prepare Workspace Directories
        run: |
          set -euo pipefail
          echo "Cleaning old build artifacts..."
          rm -rf "${OUTDIR}" "${MODULES_OUTDIR}" "${FINAL_STAGING}"
          
          # Creating identical structure to local build.sh
          mkdir -p "${OUTDIR}"
          mkdir -p "${MODULES_OUTDIR}"
          mkdir -p "${FINAL_STAGING}/lib/modules/0.0"
          mkdir -p "${IN_DLKM}"
          
          # Failsafe in case modules.load isn't in the repo yet
          if [ ! -f "${IN_DLKM}/modules.load" ]; then
            echo "# placeholder modules.load" > "${IN_DLKM}/modules.load"
          fi

      - name: Step A - Generate Config
        run: |
          set -euo pipefail
          export PATH=/usr/lib/llvm-22/bin:$PATH
          
          echo "===================================================="
          echo "Configuring and Building for ${DEVICE}..."
          echo "===================================================="
          
          cd "${KERNEL_ROOT}"
          make -j$(nproc --all) O="${OUTDIR}" ${DEVICE}_defconfig su.config perf.config custom.config 2>&1 | tee build_generate_config.log

      - name: Step B - Prepare
        run: |
          set -euo pipefail
          export PATH=/usr/lib/llvm-22/bin:$PATH
          
          cd "${KERNEL_ROOT}"
          make -j4 prepare O="${OUTDIR}" 2>&1 | tee -a build_generate_config.log

      - name: Step B - Compile Kernel Image
        run: |
          set -euo pipefail
          export PATH=/usr/lib/llvm-22/bin:$PATH
          export LD=ld.lld
          
          cd "${KERNEL_ROOT}"
          make -j$(nproc --all) O="${OUTDIR}" 2>&1 | tee build.log

      - name: Step C - Install & Strip Modules
        run: |
          set -euo pipefail
          export PATH=/usr/lib/llvm-22/bin:$PATH
          export LD=ld.lld
          
          cd "${KERNEL_ROOT}"
          echo "Installing and stripping modules to modules_out..."
          make -j$(nproc --all) O="${OUTDIR}" \
            INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" \
            INSTALL_MOD_PATH="${MODULES_OUTDIR}" \
            modules_install 2>&1 | tee -a build.log || true

      - name: Module Filtering & Dependency Logic
        run: |
          set -euo pipefail
          
          echo "Copying metadata for depmod..."
          
          find "${MODULES_OUTDIR}/lib/modules" -type f -name "modules.builtin" -exec cp {} "${FINAL_STAGING}/lib/modules/0.0/" \; || true
          find "${MODULES_OUTDIR}/lib/modules" -type f -name "modules.order" -exec cp {} "${FINAL_STAGING}/lib/modules/0.0/" \; || true
          
          if [ -f "${IN_DLKM}/modules.load" ]; then
            cp "${IN_DLKM}/modules.load" "${FINAL_STAGING}/lib/modules/0.0/modules.load"
          fi

          echo "Filtering modules based on OEM modules.load..."
          missing_modules=""
          
          while read -r module; do
            [ -z "$module" ] && continue
            [[ "$module" =~ ^#.*$ ]] && continue
            
            found=$(find "${MODULES_OUTDIR}/lib/modules" -name "$module" -type f | head -n 1 || true)
            if [ -f "$found" ]; then
              echo "FOUND: $module -> $found"
            else
              missing_modules="${missing_modules} $module"
            fi
          done < "${IN_DLKM}/modules.load"

          if [ -n "$missing_modules" ]; then
            echo "WARNING: The following modules from modules.load were not found:$missing_modules" | tee -a build.log
          fi

      - name: Finalizing Output & Packaging
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          
          if [ -f "${OUTDIR}/arch/arm64/boot/Image" ]; then
            cp "${OUTDIR}/arch/arm64/boot/Image" "${GITHUB_WORKSPACE}/artifacts/Image"
            echo -e "\n\033[1;32m====================================================\033[0m"
            echo -e "\033[1;32mBUILD SUCCESSFUL!\033[0m"
            echo -e "Kernel Image copied to artifacts directory"
            echo -e "\033[1;32m====================================================\033[0m"
          else
            echo "WARNING: Image not found at ${OUTDIR}/arch/arm64/boot/Image"
            exit 1
          fi

          if [ -d "${MODULES_OUTDIR}/lib" ]; then
            tar -C "${MODULES_OUTDIR}" -czf "${GITHUB_WORKSPACE}/artifacts/modules_out.tgz" lib
          fi
          if [ -d "${FINAL_STAGING}" ]; then
            tar -C "${FINAL_STAGING}" -czf "${GITHUB_WORKSPACE}/artifacts/staging.tgz" .
          fi

          cp "${KERNEL_ROOT}/build.log" "${GITHUB_WORKSPACE}/artifacts/build.log" || true
          cp "${KERNEL_ROOT}/build_generate_config.log" "${GITHUB_WORKSPACE}/artifacts/build_generate_config.log" || true

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m14x-kernel-build
          path: ${{ github.workspace }}/artifacts/*
